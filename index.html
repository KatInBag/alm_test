<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <!-- Оптимизированный viewport для iOS: запрет зума, корректное масштабирование -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>Медицинский тест (100 вопросов)</title>
    <style>
        :root {
            --primary: #007AFF; /* iOS Blue */
            --success: #34C759; /* iOS Green */
            --success-bg: #E8F8EC;
            --error: #FF3B30;   /* iOS Red */
            --error-bg: #FFE5E5;
            --bg: #F2F2F7;      /* iOS Grouped Background */
            --card-bg: #FFFFFF;
            --text: #000000;
            --text-secondary: #8E8E93;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent; /* Убирает серую подсветку при тапе на iOS */
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.5;
            /* Отступы для челки и нижней полосы iPhone */
            padding-top: env(safe-area-inset-top);
            padding-bottom: calc(40px + env(safe-area-inset-bottom));
            -webkit-font-smoothing: antialiased;
        }

        .header {
            background: rgba(255, 255, 255, 0.85);
            -webkit-backdrop-filter: blur(20px);
            backdrop-filter: blur(20px);
            border-bottom: 0.5px solid rgba(0, 0, 0, 0.1);
            padding: calc(12px + env(safe-area-inset-top)) 16px 12px 16px;
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .header h1 {
            font-size: 17px;
            font-weight: 600;
            color: var(--text);
        }

        .stats {
            font-size: 15px;
            color: var(--text-secondary);
            font-weight: 500;
            width: 100%;
            margin-top: 4px;
        }

        .btn-reset {
            background: var(--primary);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 18px; /* iOS pill shape */
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            transition: opacity 0.2s;
        }

        .btn-reset:active {
            opacity: 0.7;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 16px;
        }

        .info-box {
            background: #E3F2FD;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 20px;
            font-size: 15px;
            color: #0056B3;
            line-height: 1.4;
        }

        .question-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }

        .question-number {
            font-size: 13px;
            font-weight: 600;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .question-text {
            font-size: 17px; /* Оптимально для чтения на iPhone */
            font-weight: 600;
            margin-bottom: 16px;
            color: var(--text);
            line-height: 1.4;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .option-btn {
            display: block;
            width: 100%;
            text-align: left;
            padding: 16px 18px; /* Увеличенная область касания (min 44px по гайдлайнам Apple) */
            border: 1px solid #C6C6C8;
            border-radius: 10px;
            background: #FFFFFF;
            color: var(--text);
            font-size: 16px; /* 16px предотвращает авто-зум на iOS при фокусе */
            font-weight: 400;
            cursor: pointer;
            transition: all 0.15s ease;
            position: relative;
            -webkit-touch-callout: none;
            user-select: none;
        }

        .option-btn:active:not(:disabled) {
            background: #E5E5EA;
            transform: scale(0.98);
        }

        .option-btn.correct {
            background: var(--success-bg);
            border-color: var(--success);
            color: #1B7C2F;
            font-weight: 600;
        }

        .option-btn.correct::after {
            content: "✓";
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            font-weight: bold;
            font-size: 18px;
        }

        .option-btn.incorrect {
            background: var(--error-bg);
            border-color: var(--error);
            color: #C41C14;
        }

        .option-btn.incorrect::after {
            content: "✗";
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            font-weight: bold;
            font-size: 18px;
        }

        .option-btn:disabled {
            cursor: default;
        }

        .option-btn:disabled:not(.correct):not(.incorrect) {
            opacity: 0.5;
        }

        /* Адаптация для очень маленьких экранов (iPhone SE) */
        @media (max-width: 380px) {
            .question-text { font-size: 16px; }
            .option-btn { font-size: 15px; padding: 14px 16px; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>🩺 Мед. тест</h1>
        <button class="btn-reset" onclick="resetQuiz()">🔄 Перемешать</button>
        <div class="stats">Отвечено: <span id="answered-count">0</span> из <span id="total-count">100</span></div>
    </div>

    <div class="container">
        <div class="info-box">
            ℹ️ Вопросы и <strong>варианты ответов</strong> при каждом запуске перемешиваются. Нажмите на вариант: зелёный = верно, красный = ошибка (правильный ответ подсветится автоматически).
        </div>
        <div id="quiz-container"></div>
    </div>

    <script>

            {q:"ЧТО ИЗ ПЕРЕЧИСЛЕННЫХ НИЖЕ МЕРОПРИЯТИЙ НЕ ПОКАЗАНО ПРИ СТЕНОЗЕ ГОРТАНИ 2 СТЕПЕНИ", o:["отвлекающая терапия","ингаляции с гидрокортизоном","теплое питье (молоко с щелочной мин. водой)","глюкокортикоиды в/м","трахеостомия"], c:4},

            {q:"ЗДОРОВЫЙ 6-МЕСЯЧНЫЙ РЕБЕНОК ВНЕЗАПНО НАЧАЛ КРИЧАТЬ. ТЕМПЕРАТУРА НОРМАЛЬНАЯ. ЖИВОТ НАПРЯЖЕН. СТУЛА НЕТ. ПОСЛЕ РЕКТАЛЬНОГО ИССЛЕДОВАНИЯ НА ПАЛЬЦЕ КРОВЬ. ВАШ ДИАГНОЗ", o:["острый гастроэнтерит","инвагинация","острый панкреатит","острый аппендицит","младенческая колика"], c:1},
            {q:"ДЛЯ ДИФ. ДИАГНОЗА СУБФЕБРИЛИТЕТОВ ОПТИМАЛЬНО:", o:["измерение температуры через каждые 3 часа и в трех точках","2 раза в сутки: в 8 и 20 час.","измерение температуры через каждый час","четырехкратное измерение температуры в 8-13-18-22 час.","трехкратное (в 8-15-20 час.) измерение температуры"], c:0},
            {q:"ВЕДУЩИМ МОРФОЛОГИЧЕСКИМ ПРИЗНАКОМ ЦЕЛИАКИИ ЯВЛЯЕТСЯ ОДИН ИЗ ВАРИАНТОВ ИЗМЕНЕНИЙ СЛИЗИСТОЙ ОБОЛОЧКИ ТОЩЕЙ КИШКИ:", o:["значительный отек, микротромбозы, кровоизлияния, фиброз стромы","укорочение ворсин, удлинение крипт, значительное снижение соотношения ворсинка/крипта","выраженная лимфо-плазмоцитарная инфильтрация с эозинофильным компонентом","выраженная нейтрофильная инфильтрация","выраженная лимфоидная инфильтрация с формированием фолликулов"], c:1},

        let currentQuizData = [];
        let answeredCount = 0;

        // Алгоритм Фишера-Йетса для перемешивания массива
        function shuffleArray(array) {
            const shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        // Подготовка данных: перемешиваем вопросы И варианты ответов внутри них
        function prepareQuizData() {
            const shuffledQuestions = shuffleArray(quizData);
            
            return shuffledQuestions.map(item => {
                // Запоминаем текст правильного ответа до перемешивания
                const correctAnswerText = item.o[item.c];
                
                // Перемешиваем варианты ответов
                const shuffledOptions = shuffleArray(item.o);
                
                // Находим новый индекс правильного ответа в перемешанном массиве
                const newCorrectIndex = shuffledOptions.indexOf(correctAnswerText);
                
                return {
                    q: item.q,
                    o: shuffledOptions,
                    c: newCorrectIndex
                };
            });
        }

        function initQuiz() {
            currentQuizData = prepareQuizData();
            renderQuiz();
        }

        function renderQuiz() {
            const container = document.getElementById('quiz-container');
            container.innerHTML = '';
            answeredCount = 0;
            updateStats();

            currentQuizData.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'question-card';
                card.id = `q-${index}`;

                const qNum = document.createElement('div');
                qNum.className = 'question-number';
                qNum.textContent = `Вопрос ${index + 1}`;

                const qText = document.createElement('div');
                qText.className = 'question-text';
                qText.textContent = item.q;

                const optionsDiv = document.createElement('div');
                optionsDiv.className = 'options';

                item.o.forEach((opt, optIndex) => {
                    const btn = document.createElement('button');
                    btn.className = 'option-btn';
                    btn.textContent = opt;
                    btn.onclick = () => handleAnswer(index, optIndex, btn);
                    optionsDiv.appendChild(btn);
                });

                card.appendChild(qNum);
                card.appendChild(qText);
                card.appendChild(optionsDiv);
                container.appendChild(card);
            });
        }

        function handleAnswer(qIndex, selectedOptIndex, btnElement) {
            const card = document.getElementById(`q-${qIndex}`);
            const buttons = card.querySelectorAll('.option-btn');
            const correctIndex = currentQuizData[qIndex].c;

            if (btnElement.disabled) return;

            buttons.forEach(b => {
                b.disabled = true;
            });

            if (selectedOptIndex === correctIndex) {
                btnElement.classList.add('correct');
            } else {
                btnElement.classList.add('incorrect');
                buttons[correctIndex].classList.add('correct');
            }

            answeredCount++;
            updateStats();
        }

        function updateStats() {
            document.getElementById('answered-count').textContent = answeredCount;
            document.getElementById('total-count').textContent = currentQuizData.length;
        }

        function resetQuiz() {
            if (confirm('Сбросить тест и перемешать вопросы и варианты ответов заново?')) {
                initQuiz();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        document.addEventListener('DOMContentLoaded', initQuiz);
    </script>
